<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Breeze Browser - Urban Racer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            background: #111; 
            font-family: monospace; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;  
            max-height: 800px; 
            aspect-ratio: 3 / 5; 
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
        }

        #gameCanvas { 
            display: block; 
            width: 100%;
            height: 100%;
            background: #1a1a1a; 
        }
        
        #ui { 
            position: absolute; 
            top: 3%; 
            left: 0; 
            width: 100%; 
            pointer-events: none; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 4%; 
            z-index: 10; 
        }
        
        .ui-element { 
            background: rgba(0,0,0,0.6); 
            width: 30%;            
            height: 36px;             
            display: flex; 
            align-items: center; 
            justify-content: center;  
            border-radius: 4px; 
            border: 2px solid #333; 
            font-size: 11px;          
            font-weight: bold;
            text-align: center;
            color: #ffffff; /*fixed the black text bug */
        }

        @media (min-width: 400px) {
            .ui-element {
                font-size: 13px;
                height: 42px;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div class="ui-element" id="score">SCORE: 0</div>
            <div class="ui-element" id="mode" style="color: #00ffcc;">ZONE: STREET</div>
            <div class="ui-element" id="highScore">BEST: 0</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const TARGET_WIDTH = 480; 
const TARGET_HEIGHT = 800;
canvas.width = TARGET_WIDTH;
canvas.height = TARGET_HEIGHT;

let score = 0;
let highScore = localStorage.getItem('breeze_high_score') ? parseInt(localStorage.getItem('breeze_high_score')) : 0;
let isGameOver = false;
let currentZone = 'STREET'; 
let zoneTimer = 0;

const LANES_COUNT = 4;
const LANE_WIDTH = TARGET_WIDTH / LANES_COUNT;

let playerLane = Math.floor(Math.random() * LANES_COUNT); 
let targetX = (playerLane * LANE_WIDTH) + (LANE_WIDTH / 2);
let lastLane = playerLane; 
let framesInCurrentLane = 0;
let laneCampModifier = 1.0;

let laneHazardState = 'idle'; 
let activeHazardLane = -1;
let laneHazardTimer = 0;
let nextBlockCooldown = 300;  // Gives space before the first challenge appears (should be changed?)

let transitionProgress = 0; 
let transitionState = 'idle'; 

const player = {
    x: targetX,
    y: TARGET_HEIGHT - 120,
    w: 24,
    h: 40,
    speed: 15,
    color: '#00ffcc'
};

const MAX_OBSTACLES = 8;
const obstaclePool = [];
for (let i = 0; i < MAX_OBSTACLES; i++) {
    obstaclePool.push({ active: false, x: 0, y: 0, w: 0, h: 0, speed: 0, type: 'car', lane: 0 });
}

document.getElementById('highScore').innerText = `BEST: ${highScore}`;

function spawnObstacle() {
    const ob = obstaclePool.find(o => !o.active);
    if (!ob) return; 

    let openLanes = [];
    //Racing traffic flow algorithm (need more refinements)
    for (let l = 0; l < LANES_COUNT; l++) {
        if (l === activeHazardLane && laneHazardState === 'blocked') continue;
        let laneOccupied = obstaclePool.some(o => o.active && o.lane === l && o.y < 220);
        let adjacentClump = obstaclePool.some(o => o.active && Math.abs(o.lane - l) === 1 && o.y < 130);
        
        if (!laneOccupied && !adjacentClump) {
            openLanes.push(l);
        }
    }
    
    if (openLanes.length === 0) {
        for (let l = 0; l < LANES_COUNT; l++) {
            if (l === activeHazardLane && laneHazardState === 'blocked') continue;
            if (!obstaclePool.some(o => o.active && o.lane === l && o.y < 180)) {
                openLanes.push(l);
            }
        }
    }

    if (openLanes.length === 0) return;

    let targetLane = openLanes[Math.floor(Math.random() * openLanes.length)];
    // Apply camping adjustment traps if logged (need to see this)
    if (framesInCurrentLane > 150 && Math.random() < 0.5 && openLanes.includes(playerLane)) {
        targetLane = playerLane;
    }
    
    let dynamicSpeedModifier = (targetLane === playerLane) ? laneCampModifier : 1.0;

    ob.active = true;
    ob.lane = targetLane;
    ob.w = LANE_WIDTH * 0.55;
    ob.h = currentZone === 'STREET' ? 50 : 85; 
    ob.x = (targetLane * LANE_WIDTH) + (LANE_WIDTH / 2) - (ob.w / 2);
    ob.y = -ob.h;
    
    let baseSpeed = currentZone === 'STREET' ? 4.5 + (score * 0.004) : 6.5 + (score * 0.006);
    ob.speed = baseSpeed * dynamicSpeedModifier;
    ob.type = currentZone === 'STREET' ? 'car' : 'building';
}

function handleInputLeft() {
    if (isGameOver) return; 
    if (playerLane > 0) playerLane--;
    targetX = (playerLane * LANE_WIDTH) + (LANE_WIDTH / 2);
}

function handleInputRight() {
    if (isGameOver) return; 
    if (playerLane < LANES_COUNT - 1) playerLane++;
    targetX = (playerLane * LANE_WIDTH) + (LANE_WIDTH / 2);
}

window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') handleInputLeft();
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') handleInputRight();
    if (e.key === 'Enter' && isGameOver && transitionState === 'closed') {
        transitionState = 'opening';
        resetGame();
    }
});

window.addEventListener('pointerdown', (e) => {
    if (isGameOver && transitionState === 'closed') {
        transitionState = 'opening';
        resetGame();
        return;
    }
    
    const rect = canvas.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const actualCanvasWidth = rect.width;
    
    if (clickX < actualCanvasWidth / 2) {
        handleInputLeft();
    } else {
        handleInputRight();
    }
});

let spawnCooldown = 40; 
//image
function update() {
    if (transitionState === 'closing') {
        transitionProgress += 0.04; 
        if (transitionProgress >= 1) {
            transitionProgress = 1;
            transitionState = 'closed'; 
        }
        return; 
    }
    if (transitionState === 'opening') {
        transitionProgress -= 0.04;
        if (transitionProgress <= 0) { 
            transitionProgress = 0; 
            transitionState = 'idle'; 
        }
    }
    
    if (isGameOver) return;

    if (playerLane === lastLane) {
        if (score > 10) {
            framesInCurrentLane++;
            if (framesInCurrentLane > 150) {
                laneCampModifier = Math.min(1.8, 1.0 + (framesInCurrentLane - 150) * 0.004);
            }
        }
    } else {
        framesInCurrentLane = 0;
        laneCampModifier = 1.0;
        lastLane = playerLane;
    }

    if (score >= 200) {
        if (laneHazardState === 'idle') {
            nextBlockCooldown--;
            if (nextBlockCooldown <= 0) {
                activeHazardLane = Math.floor(Math.random() * LANES_COUNT);
                laneHazardState = 'warning';
                laneHazardTimer = 90; 
            }// 90 frames = Exactly 3 blinks at 30 frames per complete cycle
        } else if (laneHazardState === 'warning') {
            laneHazardTimer--;
            if (laneHazardTimer <= 0) {
                laneHazardState = 'blocked';
                laneHazardTimer = 300; //5sec
            }
        } else if (laneHazardState === 'blocked') {
            laneHazardTimer--;
            
            if (playerLane === activeHazardLane) {
                isGameOver = true;
                transitionState = 'closing';
            }
            
            if (laneHazardTimer <= 0) {
                laneHazardState = 'idle';
                activeHazardLane = -1;
                nextBlockCooldown = 240 + Math.random() * 180; 
            }
        }
    }

    player.x += (targetX - player.x) * 0.25;

    score += 0.2;
    let displayScore = Math.floor(score);
    document.getElementById('score').innerText = `SCORE: ${displayScore}`;

    if (displayScore > highScore) {
        highScore = displayScore;
        localStorage.setItem('breeze_high_score', highScore);
        document.getElementById('highScore').innerText = `BEST: ${highScore}`;
    }

    zoneTimer++;
    if (zoneTimer > 600) {
        currentZone = currentZone === 'STREET' ? 'SKY' : 'STREET';
        const modeEl = document.getElementById('mode');
        modeEl.innerText = currentZone === 'STREET' ? 'ZONE: STREET' : 'ZONE: SKY';
        modeEl.style.color = currentZone === 'STREET' ? '#00ffcc' : '#ff00aa';
        zoneTimer = 0;
    }

    spawnCooldown--;
    if (spawnCooldown <= 0) {
        spawnObstacle();
        let baseCooldown = currentZone === 'STREET' ? 55 : 40; 
        spawnCooldown = (baseCooldown / laneCampModifier) + Math.random() * 15;
    }

    for (let i = 0; i < MAX_OBSTACLES; i++) {
        const ob = obstaclePool[i];
        if (!ob.active) continue;

        ob.y += ob.speed;

        if (player.x - player.w/2 < ob.x + ob.w &&
            player.x + player.w/2 > ob.x &&
            player.y < ob.y + ob.h &&
            player.y + player.h > ob.y) {
                isGameOver = true;
                transitionState = 'closing'; 
        }

        if (ob.y > TARGET_HEIGHT) ob.active = false;
    }
}

function draw() {
    ctx.clearRect(0, 0, TARGET_WIDTH, TARGET_HEIGHT);

    ctx.strokeStyle = currentZone === 'STREET' ? 'rgba(255,255,255,0.04)' : 'rgba(255,0,170,0.06)';
    ctx.lineWidth = 2;
    for (let i = 1; i < LANES_COUNT; i++) {
        ctx.beginPath();
        ctx.moveTo(i * LANE_WIDTH, 0);
        ctx.lineTo(i * LANE_WIDTH, TARGET_HEIGHT);
        ctx.stroke();
    }

    if (score >= 200 && activeHazardLane !== -1) {
        if (laneHazardState === 'warning') {
            let isFlashVisible = Math.floor(laneHazardTimer / 15) % 2 === 0;
            if (isFlashVisible) {
                ctx.fillStyle = 'rgba(255, 17, 85, 0.2)'; 
                ctx.fillRect(activeHazardLane * LANE_WIDTH, 0, LANE_WIDTH, TARGET_HEIGHT);
                ctx.strokeStyle = 'rgba(255, 17, 85, 0.5)';
                ctx.lineWidth = 4;
                ctx.strokeRect(activeHazardLane * LANE_WIDTH + 2, 0, LANE_WIDTH - 4, TARGET_HEIGHT);
            }
        } else if (laneHazardState === 'blocked') {
            ctx.fillStyle = 'rgba(230, 0, 40, 0.35)'; 
            ctx.fillRect(activeHazardLane * LANE_WIDTH, 0, LANE_WIDTH, TARGET_HEIGHT);
            ctx.strokeStyle = 'rgba(255, 0, 50, 0.8)';
            ctx.lineWidth = 4;
            ctx.strokeRect(activeHazardLane * LANE_WIDTH + 2, 0, LANE_WIDTH - 4, TARGET_HEIGHT);
            
            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 15px monospace';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#ff0033';
            ctx.shadowBlur = 6;
            
            let centerTextX = activeHazardLane * LANE_WIDTH + LANE_WIDTH / 2;
            ctx.fillText("LANE", centerTextX, TARGET_HEIGHT / 2 - 30);
            ctx.fillText("BLOCKED!", centerTextX, TARGET_HEIGHT / 2 - 10);
            ctx.fillText("⚠️", centerTextX, TARGET_HEIGHT / 2 + 20);
            ctx.restore();
        }
    }

    for (let i = 0; i < MAX_OBSTACLES; i++) {
        const ob = obstaclePool[i];
        if (!ob.active) continue;

        if (ob.type === 'car') {
            ctx.fillStyle = '#ff3333';
            ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(ob.x + 4, ob.y + ob.h - 6, 6, 6);
            ctx.fillRect(ob.x + ob.w - 10, ob.y + ob.h - 6, 6, 6);
        } else {
            ctx.fillStyle = '#1e0030';
            ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
            ctx.strokeStyle = '#ff00aa';
            ctx.lineWidth = 3;
            ctx.strokeRect(ob.x, ob.y, ob.w, ob.h);
        }
    }

    ctx.save();
    ctx.translate(player.x, player.y + player.h / 2);
    if (currentZone === 'STREET') {
        ctx.fillStyle = '#00ffcc';
        ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
        ctx.fillStyle = '#ffffff'; 
        ctx.fillRect(-player.w / 2 + 3, -player.h / 2 + 8, player.w - 6, 8);
    } else {
        ctx.fillStyle = '#ff00aa';
        ctx.beginPath();
        ctx.moveTo(0, -player.h / 2); 
        ctx.lineTo(player.w, player.h / 2); 
        ctx.lineTo(-player.w, player.h / 2); 
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffea00';
        ctx.fillRect(-4, player.h / 2, 8, 6);
    }
    ctx.restore();

    if (transitionProgress > 0) {
        ctx.fillStyle = '#e6f2ff'; 
        
        let leftEdge = (TARGET_WIDTH / 2) * transitionProgress;
        let rightEdge = TARGET_WIDTH - ((TARGET_WIDTH / 2) * transitionProgress);

        ctx.fillRect(0, 0, leftEdge, TARGET_HEIGHT);
        ctx.fillRect(rightEdge, 0, TARGET_WIDTH / 2, TARGET_HEIGHT);

        if (transitionProgress > 0.8 && transitionState !== 'closed') {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(TARGET_WIDTH / 2, TARGET_HEIGHT / 2, 40 * (1 - (transitionProgress - 0.8) * 5), 0, Math.PI * 1.5);
            ctx.stroke();
        }

        if (transitionState === 'closed' && isGameOver) {
            ctx.fillStyle = 'rgba(17, 20, 26, 0.9)';
            ctx.fillRect(TARGET_WIDTH / 2 - 170, TARGET_HEIGHT / 2 - 130, 340, 260);
            ctx.strokeStyle = '#ff00aa';
            ctx.lineWidth = 4;
            ctx.strokeRect(TARGET_WIDTH / 2 - 170, TARGET_HEIGHT / 2 - 130, 340, 260);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 24px monospace';
            ctx.textAlign = 'center';
            ctx.fillText("CRASH DETECTED", TARGET_WIDTH / 2, TARGET_HEIGHT / 2 - 80);
            
            ctx.font = '18px monospace';
            ctx.fillStyle = '#00ffcc';
            ctx.fillText(`SCORE: ${Math.floor(score)}`, TARGET_WIDTH / 2, TARGET_HEIGHT / 2 - 20);
            ctx.fillStyle = '#ff00aa';
            ctx.fillText(`BEST SCORE: ${highScore}`, TARGET_WIDTH / 2, TARGET_HEIGHT / 2 + 15);
            
            ctx.font = 'bold 12px monospace';
            ctx.fillStyle = '#ffffff';
            ctx.fillText("PRESS ENTER OR TAP TO RIDE AGAIN", TARGET_WIDTH / 2, TARGET_HEIGHT / 2 + 80);
        }
    }
}

function resetGame() {
    score = 0;
    isGameOver = false;
    currentZone = 'STREET';
    zoneTimer = 0;
    
    playerLane = Math.floor(Math.random() * LANES_COUNT);
    targetX = (playerLane * LANE_WIDTH) + (LANE_WIDTH / 2);
    player.x = targetX;
    lastLane = playerLane; 
    framesInCurrentLane = 0;
    laneCampModifier = 1.0;
    
    laneHazardState = 'idle';
    activeHazardLane = -1;
    laneHazardTimer = 0;
    nextBlockCooldown = 300;
    
    spawnCooldown = 40;
    obstaclePool.forEach(ob => ob.active = false);
    document.getElementById('mode').innerText = 'ZONE: STREET';
    document.getElementById('mode').style.color = '#00ffcc';
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
